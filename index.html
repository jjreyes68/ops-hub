<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Generation Schedule Consolidator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .data-table-container {
            overflow-x: auto;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th {
            background: #f8f9fa;
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
            white-space: nowrap;
        }

        .data-table td {
            padding: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .data-table input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            text-align: center;
        }

        .data-table input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        .data-table select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            text-align: center;
            cursor: pointer;
        }

        .data-table tr:hover {
            background: #f8f9fa;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .output-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border: 2px solid #e0e0e0;
        }

        .output-section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
        }

        .output-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #667eea;
        }

        .output-content {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            min-height: 150px;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .output-actions {
            margin-top: 15px;
            display: flex;
            gap: 12px;
        }

        .status-message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .time-cell {
            background: #e9ecef;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Power Generation Schedule Consolidator</h1>
            <p>Consolidate hourly power generation data into time-range blocks for portal entry</p>
        </div>

        <div class="content">
            <div id="statusMessage" class="status-message"></div>

            <div class="form-section">
                <div class="form-row">
                    <div class="form-group">
                        <label for="scheduleDate">Schedule Date</label>
                        <input type="date" id="scheduleDate">
                    </div>
                    <div class="form-group">
                        <label for="siteName">Site/Unit Name (Optional)</label>
                        <input type="text" id="siteName" placeholder="e.g., Olympus – PV Phase III">
                    </div>
                </div>
            </div>

            <div class="data-table-container">
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Min MW</th>
                            <th>Max MW</th>
                            <th>Min MVAR</th>
                            <th>Max MVAR</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="processSchedule()">Process Schedule</button>
                <button class="btn btn-secondary" onclick="fillSampleData()">Fill Sample Data</button>
                <button class="btn btn-secondary" onclick="clearData()">Clear Data</button>
            </div>

            <div class="output-section">
                <h2>Consolidated Schedule</h2>
                <div id="outputHeader" class="output-header"></div>
                <div id="outputContent" class="output-content">Click "Process Schedule" to generate consolidated output...</div>
                <div class="output-actions">
                    <button class="btn btn-success" onclick="copyToClipboard()">Copy to Clipboard</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize the table with 24 hours
        function initializeTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            for (let hour = 0; hour < 24; hour++) {
                const timeStr = hour.toString().padStart(2, '0') + ':00';
                const row = document.createElement('tr');
                
                row.innerHTML = `
                    <td class="time-cell">${timeStr}</td>
                    <td><input type="number" step="0.001" min="0" id="minMW_${hour}" value="0"></td>
                    <td><input type="number" step="0.001" min="0" id="maxMW_${hour}" value="0"></td>
                    <td><input type="number" step="0.001" min="0" id="minMVAR_${hour}" value="0"></td>
                    <td><input type="number" step="0.001" min="0" id="maxMVAR_${hour}" value="0"></td>
                    <td>
                        <select id="status_${hour}">
                            <option value="Idle">Idle</option>
                            <option value="Generating">Generating</option>
                        </select>
                    </td>
                `;
                
                tbody.appendChild(row);
            }

            // Set default date to today
            document.getElementById('scheduleDate').valueAsDate = new Date();
        }

        // Fill sample data for testing
        function fillSampleData() {
            const sampleData = [
                { minMW: 0, maxMW: 0, minMVAR: 0, maxMVAR: 0, status: 'Idle' },      // 00:00
                { minMW: 0, maxMW: 0, minMVAR: 0, maxMVAR: 0, status: 'Idle' },      // 01:00
                { minMW: 0, maxMW: 0, minMVAR: 0, maxMVAR: 0, status: 'Idle' },      // 02:00
                { minMW: 0, maxMW: 0, minMVAR: 0, maxMVAR: 0, status: 'Idle' },      // 03:00
                { minMW: 0, maxMW: 2, minMVAR: 0, maxMVAR: 0, status: 'Generating' }, // 04:00
                { minMW: 0, maxMW: 2, minMVAR: 0, maxMVAR: 0, status: 'Generating' }, // 05:00
                { minMW: 0, maxMW: 0, minMVAR: 0, maxMVAR: 0, status: 'Idle' },      // 06:00
                { minMW: 0, maxMW: 166.667, minMVAR: 0, maxMVAR: 0, status: 'Generating' }, // 07:00-16:00
                { minMW: 0, maxMW: 166.667, minMVAR: 0, maxMVAR: 0, status: 'Generating' },
                { minMW: 0, maxMW: 166.667, minMVAR: 0, maxMVAR: 0, status: 'Generating' },
                { minMW: 0, maxMW: 166.667, minMVAR: 0, maxMVAR: 0, status: 'Generating' },
                { minMW: 0, maxMW: 166.667, minMVAR: 0, maxMVAR: 0, status: 'Generating' },
                { minMW: 0, maxMW: 166.667, minMVAR: 0, maxMVAR: 0, status: 'Generating' },
                { minMW: 0, maxMW: 166.667, minMVAR: 0, maxMVAR: 0, status: 'Generating' },
                { minMW: 0, maxMW: 166.667, minMVAR: 0, maxMVAR: 0, status: 'Generating' },
                { minMW: 0, maxMW: 166.667, minMVAR: 0, maxMVAR: 0, status: 'Generating' },
                { minMW: 0, maxMW: 166.667, minMVAR: 0, maxMVAR: 0, status: 'Generating' },
                { minMW: 0, maxMW: 0, minMVAR: 0, maxMVAR: 0, status: 'Idle' },      // 17:00
                { minMW: 0, maxMW: 0, minMVAR: 0, maxMVAR: 0, status: 'Idle' },      // 18:00
                { minMW: 0, maxMW: 0, minMVAR: 0, maxMVAR: 0, status: 'Idle' },      // 19:00
                { minMW: 0, maxMW: 0, minMVAR: 0, maxMVAR: 0, status: 'Idle' },      // 20:00
                { minMW: 0, maxMW: 0, minMVAR: 0, maxMVAR: 0, status: 'Idle' },      // 21:00
                { minMW: 0, maxMW: 0, minMVAR: 0, maxMVAR: 0, status: 'Idle' },      // 22:00
                { minMW: 0, maxMW: 0, minMVAR: 0, maxMVAR: 0, status: 'Idle' }       // 23:00
            ];

            for (let hour = 0; hour < 24; hour++) {
                document.getElementById(`minMW_${hour}`).value = sampleData[hour].minMW;
                document.getElementById(`maxMW_${hour}`).value = sampleData[hour].maxMW;
                document.getElementById(`minMVAR_${hour}`).value = sampleData[hour].minMVAR;
                document.getElementById(`maxMVAR_${hour}`).value = sampleData[hour].maxMVAR;
                document.getElementById(`status_${hour}`).value = sampleData[hour].status;
            }

            showStatus('Sample data loaded successfully!', 'success');
        }

        // Clear all data
        function clearData() {
            for (let hour = 0; hour < 24; hour++) {
                document.getElementById(`minMW_${hour}`).value = 0;
                document.getElementById(`maxMW_${hour}`).value = 0;
                document.getElementById(`minMVAR_${hour}`).value = 0;
                document.getElementById(`maxMVAR_${hour}`).value = 0;
                document.getElementById(`status_${hour}`).value = 'Idle';
            }
            
            document.getElementById('siteName').value = '';
            document.getElementById('outputContent').textContent = 'Click "Process Schedule" to generate consolidated output...';
            document.getElementById('outputHeader').textContent = '';
            
            showStatus('Data cleared!', 'success');
        }

        // Process the schedule and consolidate consecutive hours
        function processSchedule() {
            const data = [];
            
            // Collect data from all 24 hours
            for (let hour = 0; hour < 24; hour++) {
                const timeStr = hour.toString().padStart(2, '0') + ':00';
                data.push({
                    time: timeStr,
                    hour: hour,
                    minMW: parseFloat(document.getElementById(`minMW_${hour}`).value) || 0,
                    maxMW: parseFloat(document.getElementById(`maxMW_${hour}`).value) || 0,
                    minMVAR: parseFloat(document.getElementById(`minMVAR_${hour}`).value) || 0,
                    maxMVAR: parseFloat(document.getElementById(`maxMVAR_${hour}`).value) || 0,
                    status: document.getElementById(`status_${hour}`).value
                });
            }

            // Consolidate consecutive identical hours
            const groups = [];
            
            if (data.length === 0) {
                showStatus('No data to process!', 'error');
                return;
            }

            let currentGroup = {
                start: data[0].time,
                startHour: data[0].hour,
                end: data[0].time,
                endHour: data[0].hour,
                minMW: data[0].minMW,
                maxMW: data[0].maxMW,
                minMVAR: data[0].minMVAR,
                maxMVAR: data[0].maxMVAR,
                status: data[0].status
            };

            for (let i = 1; i < data.length; i++) {
                const hour = data[i];
                
                // Check if current hour has identical parameters to current group
                if (hour.minMW === currentGroup.minMW &&
                    hour.maxMW === currentGroup.maxMW &&
                    hour.minMVAR === currentGroup.minMVAR &&
                    hour.maxMVAR === currentGroup.maxMVAR &&
                    hour.status === currentGroup.status) {
                    // Continue same group (extend end time)
                    currentGroup.end = hour.time;
                    currentGroup.endHour = hour.hour;
                } else {
                    // Save current group, start new one
                    groups.push({...currentGroup});
                    currentGroup = {
                        start: hour.time,
                        startHour: hour.hour,
                        end: hour.time,
                        endHour: hour.hour,
                        minMW: hour.minMW,
                        maxMW: hour.maxMW,
                        minMVAR: hour.minMVAR,
                        maxMVAR: hour.maxMVAR,
                        status: hour.status
                    };
                }
            }

            // Don't forget the last group
            groups.push(currentGroup);

            // Format output
            let output = '';
            
            // Add header with date and site name if provided
            const dateInput = document.getElementById('scheduleDate').value;
            const siteName = document.getElementById('siteName').value;
            
            if (dateInput || siteName) {
                let header = '';
                if (dateInput) {
                    const formattedDate = new Date(dateInput).toLocaleDateString('en-US', {
                        weekday: 'long',
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                    header += `Schedule Date: ${formattedDate}`;
                }
                if (siteName) {
                    if (header) header += '\n';
                    header += `Site: ${siteName}`;
                }
                if (header) {
                    document.getElementById('outputHeader').textContent = header;
                }
            } else {
                document.getElementById('outputHeader').textContent = '';
            }

            // Format each group
            groups.forEach(group => {
                const endDisplay = group.endHour.toString().padStart(2, '0') + ':59';
                const line = `${group.start} – ${endDisplay}    ${group.minMW} / ${group.maxMW} MW    ${group.minMVAR} / ${group.maxMVAR} MVAR    (${group.status})`;
                output += line + '\n';
            });

            document.getElementById('outputContent').textContent = output;
            showStatus(`Successfully consolidated ${data.length} hours into ${groups.length} time-range blocks!`, 'success');
        }

        // Copy output to clipboard
        function copyToClipboard() {
            const outputContent = document.getElementById('outputContent').textContent;
            const outputHeader = document.getElementById('outputHeader').textContent;
            
            let fullOutput = '';
            if (outputHeader) {
                fullOutput = outputHeader + '\n\n' + outputContent;
            } else {
                fullOutput = outputContent;
            }
            
            navigator.clipboard.writeText(fullOutput).then(() => {
                showStatus('Copied to clipboard!', 'success');
            }).catch(err => {
                showStatus('Failed to copy to clipboard: ' + err, 'error');
            });
        }

        // Show status message
        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message status-' + type;
            statusEl.style.display = 'block';
            
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3000);
        }

        // Initialize on page load
        window.onload = initializeTable;
    </script>
</body>
</html>
